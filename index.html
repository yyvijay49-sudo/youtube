<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: black;
        overflow: hidden;
    }

    /* Container fits your WebView (even if half screen) */
    #player-container {
        position: relative;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Let YouTube manage aspect ratio properly */
    iframe {
        max-width: 100%;
        max-height: 100%;
    }

    /* Optional: Next button */
    #controls {
        position: absolute;
        bottom: 10px;
        right: 10px;
        z-index: 10;
    }

    button {
        padding: 8px 12px;
        font-size: 14px;
    }
</style>
</head>

<body>

<div id="player-container">
    <div id="player"></div>

    <!-- Optional manual control -->
    <div id="controls">
        <button onclick="playNext()">Next ▶</button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

const videoIds = [
    "dQw4w9WgXcQ",
    "3JZ_D3ELwOQ",
    "aqz-KE-bpKQ"
];

let currentIndex = 0;
let player = null;
let playerReady = false;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
}

shuffle(videoIds);

function onYouTubeIframeAPIReady() {

    player = new YT.Player('player', {

        width: '100%',
        height: '100%',

        videoId: videoIds[currentIndex],

        playerVars: {

            autoplay: 1,
            mute: 1,
            controls: 1,
            playsinline: 1,
            rel: 0,
            enablejsapi: 1

        },

        events: {

            onReady: onPlayerReady,
            onStateChange: onPlayerStateChange,
            onError: onPlayerError

        }

    });

}

function onPlayerReady(event) {

    playerReady = true;

    event.target.playVideo();
}

function onPlayerStateChange(event) {

    if (event.data === YT.PlayerState.ENDED) {
        playNext();
    }
}

function onPlayerError(event) {

    console.log("YT ERROR = " + event.data);

    // Retry current video once
    setTimeout(function(){

        if(playerReady){
            player.loadVideoById(videoIds[currentIndex]);
        }

    },1500);
}

function playNext() {

    if(!playerReady)
        return;

    currentIndex++;

    if(currentIndex >= videoIds.length)
        currentIndex = 0;

    player.loadVideoById(videoIds[currentIndex]);
}

function pauseVideo(){

    if(playerReady){

        try{
            player.pauseVideo();
        }catch(e){}
    }
}

/*function resumeVideo(){

    if(playerReady){

        try{

            player.playVideo();

        }catch(e){}

    }
}*/
function resumeVideo() {

    if (!playerReady)
        return;

    setTimeout(function () {
        try {
            player.playVideo();
        } catch(e) {}
    }, 500);
}
/*
 * Android Bridge
 */

window.AndroidPage = {

    pause : function(){

        pauseVideo();

    },

    resume : function(){

        resumeVideo();

    }

};

</script>

</body>
</html>
