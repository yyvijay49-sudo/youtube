<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: black;
        overflow: hidden;
    }

    /* Container fits your WebView (even if half screen) */
    #player-container {
        position: relative;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Let YouTube manage aspect ratio properly */
    iframe {
        max-width: 100%;
        max-height: 100%;
    }

    /* Optional: Next button */
    #controls {
        position: absolute;
        bottom: 10px;
        right: 10px;
        z-index: 10;
    }

    button {
        padding: 8px 12px;
        font-size: 14px;
    }
</style>
</head>

<body>

<div id="player-container">
    <div id="player"></div>

    <!-- Optional manual control -->
    <div id="controls">
        <button onclick="playNext()">Next ▶</button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    // 👉 Mix of normal + shorts video IDs
    var videoIds = [
		"dQw4w9WgXcQ",  // working
    "3JZ_D3ELwOQ",  // working
    "aqz-KE-bpKQ",   // working
     "oc6fMfTAyHg"   
    ];
//"dQw4w9WgXcQ",  // 16:9 example
  //      "3JZ_D3ELwOQ",  // 16:9 example
    //    "SHORTS_ID_1", // replace with real Shorts ID
      //  "SHORTS_ID_2"  // replace with real Shorts ID
    var currentIndex = 0;
    var player;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: videoIds[currentIndex],
            width: '100%',
            height: '100%',
            playerVars: {
                autoplay: 1,
                mute: 1,
                controls: 1,
                playsinline: 1,
                rel: 0
            },
            events: {
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerStateChange(event) {
        // 0 = ended
        if (event.data === 0) {
            playNext();
        }
    }

    function playNext() {
        currentIndex++;
        if (currentIndex >= videoIds.length) {
            currentIndex = 0; // loop
        }
        player.loadVideoById(videoIds[currentIndex]);
    }
</script>

</body>
</html>
