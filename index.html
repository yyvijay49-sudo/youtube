<!DOCTYPE html>
<html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        #player-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        iframe {
            max-width: 100%;
            max-height: 100%;
        }

        #controls {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 10;
        }

        button {
            padding: 8px 12px;
            font-size: 14px;
        }

    </style>

</head>

<body>

<div id="player-container">

    <div id="player"></div>

    <div id="controls">
        <button onclick="playNext()">Next ▶</button>
    </div>

</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

    var videoIds = [
        "dQw4w9WgXcQ",
        "3JZ_D3ELwOQ",
        "aqz-KE-bpKQ"
    ];

    var currentIndex = 0;
    var player;

    // Shuffle only once
    function shuffle(array) {

        for (let i = array.length - 1; i > 0; i--) {

            let j = Math.floor(Math.random() * (i + 1));

            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    shuffle(videoIds);

    function onYouTubeIframeAPIReady() {

        player = new YT.Player('player', {

            videoId: videoIds[currentIndex],

            width: '100%',
            height: '100%',

            playerVars: {

                autoplay: 1,
                mute: 1,
                controls: 1,
                playsinline: 1,
                origin: window.location.origin

            },

            events: {

                onStateChange: onPlayerStateChange

            }

        });
    }

    function onPlayerStateChange(event) {

        if (event.data === YT.PlayerState.ENDED) {
            playNext();
        }
    }

    function playNext() {

        currentIndex++;

        if (currentIndex >= videoIds.length) {
            currentIndex = 0;
        }

        player.loadVideoById(videoIds[currentIndex]);
    }

    function pauseVideo() {

        try {

            if (player) {
                player.pauseVideo();
            }

        } catch (e) {}

    }

    function resumeVideo() {
        tryResume(0);
    }

    function tryResume(attempt) {

        if (!player) {

            if (attempt < 10) {

                setTimeout(function () {
                    tryResume(attempt + 1);
                }, 200);

            }

            return;
        }

        try {

            let state = player.getPlayerState();

            if (state === YT.PlayerState.PLAYING)
                return;

            if (state === YT.PlayerState.PAUSED ||
                state === YT.PlayerState.CUED) {

                player.playVideo();

                setTimeout(function () {

                    if (player.getPlayerState() !== YT.PlayerState.PLAYING &&
                        attempt < 10) {

                        tryResume(attempt + 1);

                    }

                }, 200);

                return;
            }

        } catch (e) {}

        if (attempt < 10) {

            setTimeout(function () {
                tryResume(attempt + 1);
            }, 200);

        }
    }

    window.AndroidPage = {

        pause: function () {
            pauseVideo();
        },

        resume: function () {
            resumeVideo();
        }

    };

</script>

</body>

</html>
