<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        background: black;
        overflow: hidden;
    }

    /* Container fits your WebView (even if half screen) */
    #player-container {
        position: relative;
        width: 100%;
        height: 100%;
        background: black;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* Let YouTube manage aspect ratio properly */
    iframe {
        max-width: 100%;
        max-height: 100%;
    }

    /* Optional: Next button */
    #controls {
        position: absolute;
        bottom: 10px;
        right: 10px;
        z-index: 10;
    }

    button {
        padding: 8px 12px;
        font-size: 14px;
    }
</style>
</head>

<body>

<div id="player-container">
    <div id="player"></div>

    <!-- Optional manual control -->
    <div id="controls">
        <button onclick="playNext()">Next ▶</button>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    var videoIds = [
         "dQw4w9WgXcQ",
         "3JZ_D3ELwOQ",
         "aqz-KE-bpKQ"
       // "oc6fMfTAyHg","XWJtgNNP-cg","wn28-YKQz6U","W2nCn2uPGCc","j9xCFzvphLw","WX74RR-X6fI"
    ];

    var currentIndex = 0;
    var player;

    // 🔀 Shuffle only once
    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    shuffle(videoIds); // 👉 only on page load

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: videoIds[currentIndex],
            width: '100%',
            height: '100%',
            playerVars: {
                autoplay: 1,
                mute: 1,
                controls: 1,
                playsinline: 1,
                origin: window.location.origin
            },
            events: {
                'onStateChange': onPlayerStateChange
            }
        });
    }

    function onPlayerStateChange(event) {
        if (event.data === 0) {
            playNext();
        }
    }

    function playNext() {
        currentIndex++;

        if (currentIndex >= videoIds.length) {
            currentIndex = 0; // 🔁 loop SAME shuffled order
        }

        player.loadVideoById(videoIds[currentIndex]);
    }
</script>

</body>
</html>
